<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Product — AmaniRenas Beauty</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#7B3F00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- Stylesheets (same order as home/catalog) -->
  <link rel="stylesheet" href="../assets/css/swap.css">
  <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/slick.css">
  <link rel="stylesheet" href="../assets/css/style-base.css">
  <link rel="stylesheet" href="../assets/css/style-merchant.css">
  <link rel="stylesheet" href="../assets/css/style-storefront.css">
  <link rel="stylesheet" href="../assets/css/media_query.css">

  <style>
    /* ── Product detail specific overrides ── */
    .product-image-slider .slick-slide img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }
    .product-image-slider .slick-dots {
      bottom: 10px;
    }
    .product-image-slider .slick-dots li button:before {
      color: #fff;
      opacity: 0.7;
      font-size: 8px;
    }
    .product-image-slider .slick-dots li.slick-active button:before {
      color: #fff;
      opacity: 1;
    }
    .product-img-counter {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(0,0,0,.45);
      color: #fff;
      font-size: 12px;
      padding: 2px 9px;
      border-radius: 20px;
      pointer-events: none;
      z-index: 5;
    }
    /* Back button overlay on image */
    .img-back-btn {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 10;
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,.88);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
      text-decoration: none;
    }
    .img-back-btn svg { width:18px; height:18px; }

    /* ── Product title & meta ── */
    .product-meta-block {
      padding: 16px 16px 0;
    }
    .product-category-chip {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--merchant-primary);
      background: color-mix(in srgb, var(--merchant-primary) 10%, transparent);
      border-radius: 20px;
      padding: 3px 10px;
      margin-bottom: 8px;
    }
    .product-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--merchant-text);
      line-height: 1.35;
      margin: 0 0 10px;
    }
    .product-rating-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: #666;
    }
    .rating-stars {
      display: flex;
      align-items: center;
      gap: 3px;
      color: #F59E0B;
      font-weight: 600;
    }
    .rating-stars svg { width:14px; height:14px; fill: #F59E0B; }
    .sold-badge { color: #888; }

    /* ── Price block ── */
    .price-block {
      padding: 14px 16px;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .price-current {
      font-size: 26px;
      font-weight: 800;
      color: var(--merchant-primary);
    }
    .price-original {
      font-size: 16px;
      color: #aaa;
      text-decoration: line-through;
    }
    .price-badge {
      font-size: 12px;
      font-weight: 700;
      background: #EF4444;
      color: #fff;
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* ── Section dividers ── */
    .section-divider {
      height: 8px;
      background: #F5F5F5;
      border: none;
      margin: 0;
    }
    .detail-section {
      padding: 16px;
    }
    .detail-section-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--merchant-text);
      margin: 0 0 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    /* ── Description collapse ── */
    .description-text {
      font-size: 14px;
      color: #555;
      line-height: 1.65;
      overflow: hidden;
      max-height: 72px;
      transition: max-height .35s ease;
    }
    .description-text.expanded { max-height: 600px; }
    .read-more-toggle {
      background: none;
      border: none;
      color: var(--merchant-primary);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 0 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .read-more-toggle svg { width:14px; height:14px; transition: transform .25s; }
    .read-more-toggle.open svg { transform: rotate(180deg); }

    /* ── Attributes table ── */
    .attr-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 9px 0;
      border-bottom: 1px solid #F0EDE8;
      font-size: 13px;
    }
    .attr-row:last-child { border-bottom: none; }
    .attr-key { color: #888; flex-shrink: 0; margin-right: 12px; }
    .attr-val { color: var(--merchant-text); font-weight: 600; text-align: right; }

    /* ── Variants ── */
    .variant-section { padding: 0 16px 16px; }
    .variant-label {
      font-size: 13px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 10px;
    }
    .variant-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .variant-chip {
      padding: 6px 14px;
      border: 1.5px solid #DDD;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--merchant-text);
      background: #fff;
      cursor: pointer;
      transition: all .2s;
    }
    .variant-chip.active,
    .variant-chip:focus {
      border-color: var(--merchant-primary);
      color: var(--merchant-primary);
      background: color-mix(in srgb, var(--merchant-primary) 8%, transparent);
      outline: none;
    }
    .color-chip {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      cursor: pointer;
      position: relative;
    }
    .color-chip.active {
      border-color: var(--merchant-primary);
    }
    .color-chip.active::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      border: 2px solid #fff;
    }

    /* ── Quantity ── */
    .qty-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 16px 16px;
    }
    .qty-label {
      font-size: 13px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .qty-control {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1.5px solid #DDD;
      border-radius: 24px;
      overflow: hidden;
    }
    .qty-btn {
      width: 38px;
      height: 38px;
      background: none;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      color: var(--merchant-primary);
      font-weight: 700;
      transition: background .2s;
    }
    .qty-btn:active { background: #F5F0EB; }
    .qty-value {
      min-width: 32px;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--merchant-text);
    }

    /* ── WhatsApp sticky bar ── */
    .wa-sticky-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-top: 1px solid #EEE;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      z-index: 200;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .wa-quick-contact {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #F5F0EB;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }
    .wa-quick-contact svg { width:22px; height:22px; fill: var(--merchant-primary); }
    .wa-order-btn {
      flex: 1;
      height: 48px;
      background: #25D366;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      letter-spacing: .02em;
      text-decoration: none;
      transition: filter .2s;
    }
    .wa-order-btn:active { filter: brightness(.9); }
    .wa-order-btn svg { width:20px; height:20px; fill:#fff; flex-shrink:0; }

    /* ── Similar products mini-strip ── */
    .similar-strip { padding: 16px 16px 100px; }
    .similar-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #F0EDE8;
      text-decoration: none;
    }
    .similar-card:last-child { border-bottom: none; }
    .similar-thumb {
      width: 60px;
      height: 60px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: #EEE;
    }
    .similar-info { flex: 1; min-width: 0; }
    .similar-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--merchant-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .similar-price {
      font-size: 13px;
      color: var(--merchant-primary);
      font-weight: 700;
      margin-top: 2px;
    }
    .similar-arrow {
      width: 20px;
      height: 20px;
      color: #CCC;
      flex-shrink: 0;
    }
  </style>
</head>

<script>
'use strict';
// ─── State ───────────────────────────────────────────────────
let currentProduct = null;
let currentQty     = 1;
let selectedSize   = null;
let selectedColor  = null;
let descExpanded   = false;
const MAX_QTY      = 99;

// ─── Resolve product from URL param ──────────────────────────
function getProductFromURL() {
  const params = new URLSearchParams(window.location.search);
  const id     = params.get('id');
  if (!id || !MERCHANT || !MERCHANT.products) return null;
  return MERCHANT.products.find(p => p.id === id) || MERCHANT.products[0];
}

// ─── Apply merchant theme ─────────────────────────────────────
function applyTheme() {
  if (!MERCHANT || !MERCHANT.colors) return;
  const r = document.documentElement.style;
  r.setProperty('--merchant-primary',   MERCHANT.colors.primary);
  r.setProperty('--merchant-secondary', MERCHANT.colors.secondary);
  r.setProperty('--merchant-surface',   MERCHANT.colors.surface);
  r.setProperty('--merchant-text',      MERCHANT.colors.text);
  document.querySelector('meta[name="theme-color"]').content = MERCHANT.colors.primary;
}

// ─── Render image slider ──────────────────────────────────────
function renderImageSlider(product) {
  const $slider = $('#productImageSlider');
  $slider.empty();

  const images = (product.images && product.images.length)
    ? product.images
    : [product.thumbnail || 'assets/images/home-screen/featured-img1.png'];

  images.forEach((src, i) => {
    $slider.append(`
      <div>
        <img src="../${src}" alt="${product.name} image ${i+1}" loading="${i===0?'eager':'lazy'}">
      </div>
    `);
  });

  $slider.slick({
    infinite:     images.length > 1,
    dots:         images.length > 1,
    arrows:       false,
    fade:         true,
    speed:        300,
    lazyLoad:     'ondemand',
  });

  const total = images.length;
  $('#imgCounter').text(`1 / ${total}`);
  $slider.on('afterChange', (e, slick, idx) => {
    $('#imgCounter').text(`${idx+1} / ${total}`);
  });

  if (total <= 1) $('#imgCounter').hide();
}

// ─── Render product info ──────────────────────────────────────
function renderProductInfo(product) {
  document.title = `${product.name} — ${MERCHANT.name}`;

  // category
  const cat = MERCHANT.categories.find(c => c.id === product.category);
  document.getElementById('productCategory').textContent = cat ? cat.name : 'Beauty';

  // title
  document.getElementById('productTitle').textContent = product.name;

  // rating
  document.getElementById('ratingValue').textContent = product.rating || '—';
  document.getElementById('reviewCount').textContent  = product.reviewCount
    ? `${product.reviewCount} reviews` : '';
  document.getElementById('soldCount').textContent    = product.sold
    ? `${product.sold.toLocaleString()} sold` : '';

  // price
  const sym = MERCHANT.currencySymbol || '£';
  document.getElementById('priceMain').textContent = `${sym}${product.price.toFixed(2)}`;
  if (product.origPrice) {
    document.getElementById('priceOrig').textContent = `${sym}${product.origPrice.toFixed(2)}`;
    document.getElementById('priceOrig').style.display = '';
    const pct = Math.round((1 - product.price / product.origPrice) * 100);
    document.getElementById('priceBadge').textContent = `-${pct}%`;
    document.getElementById('priceBadge').style.display = '';
  }

  // description
  document.getElementById('productDescription').textContent = product.description || '';
  // hide read-more if short
  const desc = document.getElementById('productDescription');
  if (desc.scrollHeight <= 75) {
    document.getElementById('readMoreBtn').style.display = 'none';
    desc.style.maxHeight = 'none';
  }

  // attributes
  const list = document.getElementById('attributesList');
  if (product.attributes && product.attributes.length) {
    list.innerHTML = product.attributes.map(a =>
      `<div class="attr-row">
         <span class="attr-key">${a.key}</span>
         <span class="attr-val">${a.value}</span>
       </div>`
    ).join('');
  } else {
    document.getElementById('attributesSection').style.display = 'none';
  }
}

// ─── Render variants ─────────────────────────────────────────
function renderVariants(product) {
  const hasSizes  = product.variants && product.variants.sizes  && product.variants.sizes.length;
  const hasColors = product.variants && product.variants.colors && product.variants.colors.length;

  if (!hasSizes && !hasColors) return;
  document.getElementById('variantSection').style.display = '';

  if (hasSizes) {
    document.getElementById('sizeVariants').style.display = '';
    const chips = product.variants.sizes.map((s, i) => {
      const active = i === 0 ? ' active' : '';
      if (i === 0) selectedSize = s;
      return `<button class="variant-chip${active}" onclick="selectSize('${s}', this)">${s}</button>`;
    }).join('');
    document.getElementById('sizeChips').innerHTML = chips;
    if (selectedSize) document.getElementById('selectedSize').textContent = `· ${selectedSize}`;
  }

  if (hasColors) {
    document.getElementById('colorVariants').style.display = '';
    const chips = product.variants.colors.map((c, i) => {
      const active = i === 0 ? ' active' : '';
      if (i === 0) selectedColor = c.name;
      return `<div class="color-chip${active}" style="background:${c.hex}"
                   title="${c.name}" onclick="selectColor('${c.name}', this)"></div>`;
    }).join('');
    document.getElementById('colorChips').innerHTML = chips;
    if (selectedColor) document.getElementById('selectedColor').textContent = `· ${selectedColor}`;
  }
}

// ─── Render similar products ──────────────────────────────────
function renderSimilar(product) {
  const sym = MERCHANT.currencySymbol || '£';
  const others = MERCHANT.products
    .filter(p => p.id !== product.id && p.category === product.category)
    .slice(0, 4);

  // fallback: just show any other products if no same-category
  const list = others.length
    ? others
    : MERCHANT.products.filter(p => p.id !== product.id).slice(0, 3);

  const container = document.getElementById('similarProducts');
  container.innerHTML = list.map(p => `
    <a href="storefront-product.html?id=${p.id}" class="similar-card">
      <img class="similar-thumb" src="../${p.thumbnail}" alt="${p.shortName || p.name}" loading="lazy">
      <div class="similar-info">
        <div class="similar-name">${p.shortName || p.name}</div>
        <div class="similar-price">${sym}${p.price.toFixed(2)}</div>
      </div>
      <svg class="similar-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </a>
  `).join('');
}

// ─── Quantity controls ────────────────────────────────────────
function changeQty(delta) {
  currentQty = Math.max(1, Math.min(MAX_QTY, currentQty + delta));
  document.getElementById('qtyValue').textContent = currentQty;
}

// ─── Description toggle ───────────────────────────────────────
function toggleDescription() {
  descExpanded = !descExpanded;
  const el  = document.getElementById('productDescription');
  const btn = document.getElementById('readMoreBtn');
  el.classList.toggle('expanded', descExpanded);
  btn.classList.toggle('open', descExpanded);
  btn.childNodes[0].textContent = descExpanded ? 'Show less ' : 'Read more ';
}

// ─── Variant selection ────────────────────────────────────────
function selectSize(size, el) {
  selectedSize = size;
  document.querySelectorAll('#sizeChips .variant-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('selectedSize').textContent = `· ${size}`;
}
function selectColor(name, el) {
  selectedColor = name;
  document.querySelectorAll('#colorChips .color-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('selectedColor').textContent = `· ${name}`;
}

// ─── WhatsApp inquiry ─────────────────────────────────────────
function sendProductInquiry() {
  if (!currentProduct) return;
  const sym     = MERCHANT.currencySymbol || '£';
  const price   = (currentProduct.price * currentQty).toFixed(2);
  const options = [];
  if (selectedSize)  options.push(`Size: ${selectedSize}`);
  if (selectedColor) options.push(`Colour: ${selectedColor}`);
  if (currentQty > 1) options.push(`Qty: ${currentQty}`);

  // Build inquiry ID  
  const inqId  = `INQ-${Date.now().toString(36).toUpperCase()}-${currentProduct.id.slice(-4).toUpperCase()}`;
  const optsLine = options.length ? `\n${options.join(' | ')}` : '';

  const msg = [
    `Hello! 👋 I'd like to enquire about:`,
    `*${currentProduct.name}*`,
    `Price: ${sym}${price}${optsLine}`,
    `Ref: ${inqId}`,
    `Seen on: ${window.location.href}`,
    ``,
    `Please confirm availability and how to proceed. Thank you!`
  ].join('\n');

  // track
  if (typeof ANALYTICS !== 'undefined') {
    ANALYTICS.trackWATap(currentProduct.id, currentProduct.name, inqId);
  }

  // store inquiry locally
  try {
    const inquiries = JSON.parse(localStorage.getItem('wa_inquiries') || '[]');
    inquiries.unshift({
      id:        inqId,
      productId: currentProduct.id,
      product:   currentProduct.name,
      price:     price,
      options,
      ts:        Date.now(),
      status:    'sent',
    });
    localStorage.setItem('wa_inquiries', JSON.stringify(inquiries.slice(0,50)));
  } catch(e) {}

  const waURL = `https://wa.me/${MERCHANT.whatsapp}?text=${encodeURIComponent(msg)}`;
  window.open(waURL, '_blank');
}

// Quick contact (no product context)
document.getElementById('waQuickBtn').addEventListener('click', function(e) {
  e.preventDefault();
  const msg = `Hello! 👋 I have a question about your products.\n\nMerchant: ${MERCHANT.name}`;
  window.open(`https://wa.me/${MERCHANT.whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
});

// ─── Init ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  applyTheme();

  currentProduct = getProductFromURL();
  if (!currentProduct) {
    document.getElementById('productTitle').textContent = 'Product not found';
    return;
  }

  renderImageSlider(currentProduct);
  renderProductInfo(currentProduct);
  renderVariants(currentProduct);
  renderSimilar(currentProduct);

  // analytics
  if (typeof ANALYTICS !== 'undefined') {
    ANALYTICS.trackProductView(currentProduct.id, currentProduct.name);
  }

  // page loader
  setTimeout(() => {
    const loader = document.getElementById('page-loader');
    if (loader) loader.style.opacity = '0';
    setTimeout(() => { if(loader) loader.remove(); }, 400);
  }, 300);
});
</script>
