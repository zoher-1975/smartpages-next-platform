<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7B3F00">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" type="image/svg+xml" href="../assets/images/svg/favicon.svg">
  <title>Products — AmaniRenas Beauty</title>

  <link rel="stylesheet" href="../assets/css/swap.css">
  <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/slick.css">
  <link rel="stylesheet" href="../assets/css/style-base.css">
  <link rel="stylesheet" href="../assets/css/style-merchant.css">
  <link rel="stylesheet" href="../assets/css/style-storefront.css">
  <link rel="stylesheet" href="../assets/css/media_query.css">
  <style>
    :root { --merchant-primary:#7B3F00; --merchant-secondary:#D4AF37; --merchant-surface:#FAF7F2; --merchant-text:#1A1206; }
    body { background: #F9F6F2; }
  </style>
</head>
<body>
<div class="site_content">

  <div class="page-loader" id="page-loader"><div class="blob"></div></div>

  <!-- ══ Header ═════════════════════════════════════════════════════ -->
  <header id="top-navbar" class="top-navbar top-navbar2">
    <div class="top-header-full">
      <div class="back-btn">
        <a href="storefront-home.html">
          <img src="../assets/images/svg/left-black-arrow.svg" alt="Back">
        </a>
      </div>
      <div class="header-title">
        <h1 id="catalog-header-title">Products</h1>
      </div>
      <button class="skip-header-btn" data-wa-contact="true" style="background:none;border:none;cursor:pointer;" aria-label="WhatsApp">
        <img src="../assets/images/svg/whatsapp.svg" alt="WhatsApp" style="width:22px;height:22px;">
      </button>
    </div>
  </header>

  <section class="section-main-ver p-0 pb-5" style="margin-top:60px;">

    <!-- Search -->
    <div class="sf-search">
      <img src="../assets/images/svg/Icon-Search.svg" alt="Search">
      <input type="text" id="catalog-search" placeholder="Search products..." autocomplete="off">
    </div>

    <!-- Category Filter Row -->
    <div class="sf-cat-row" id="cat-filter-row" style="margin-top:12px;">
      <a href="#" class="sf-cat-chip active" data-cat="all">
        <div class="cat-circle" style="background:var(--merchant-surface);">
          <img src="../assets/images/svg/fashion.svg" alt="All" style="width:28px;height:28px;object-fit:contain;">
        </div>
        <span class="cat-name">All</span>
      </a>
    </div>

    <!-- Campaign Banner (shown when campaign filter active) -->
    <div id="campaign-banner" style="display:none;margin:12px 12px 0;">
      <div class="sf-countdown" id="campaign-countdown">
        <span class="cd-label">Offer ends in</span>
        <div class="cd-timer" id="cd-timer-wrap">
          <div class="cd-unit"><span class="cd-num" id="cd-h">00</span><span class="cd-unit-lbl">hrs</span></div>
          <span style="font-size:16px;font-weight:700;margin:0 2px;">:</span>
          <div class="cd-unit"><span class="cd-num" id="cd-m">00</span><span class="cd-unit-lbl">min</span></div>
          <span style="font-size:16px;font-weight:700;margin:0 2px;">:</span>
          <div class="cd-unit"><span class="cd-num" id="cd-s">00</span><span class="cd-unit-lbl">sec</span></div>
        </div>
      </div>
    </div>

    <!-- Sort / View controls -->
    <div class="sf-filter-row" style="margin-top:12px;">
      <button class="sf-filter-btn" data-bs-toggle="modal" data-bs-target="#sortModal">
        <img src="../assets/images/svg/filterSvg2.svg" alt="Sort">
        Sort by <img src="../assets/images/svg/arrow-down.svg" alt="▼" style="width:12px;margin-left:2px;">
      </button>
      <div class="sf-view-toggle">
        <button class="sf-view-btn active" id="grid-view-btn" aria-label="Grid view">
          <img src="../assets/images/svg/button-filter.svg" alt="Grid">
        </button>
        <button class="sf-view-btn" id="list-view-btn" aria-label="List view">
          <img src="../assets/images/svg/button-setting.svg" alt="List">
        </button>
      </div>
    </div>

    <!-- Results count -->
    <div style="padding:8px 12px 4px;font-size:12px;color:var(--merchant-muted);font-family:'Jost',sans-serif;">
      <span id="results-count">5 products</span>
    </div>

    <!-- Product Grid / List -->
    <div class="sf-grid" id="catalog-grid"></div>
    <div class="sf-list" id="catalog-list" style="display:none;"></div>

    <!-- Empty State -->
    <div class="sf-empty" id="catalog-empty" style="display:none;">
      <img src="../assets/images/svg/search-footer.svg" alt="No results">
      <div class="empty-h">No products found</div>
      <div class="empty-p">Try a different search or browse all categories</div>
    </div>

  </section>

  <!-- ══ Bottom Navigation ══════════════════════════════════════════ -->
  <nav class="m-bottom-nav">
    <a href="storefront-home.html" class="m-nav-item">
      <div class="m-nav-icon"><img src="../assets/images/svg/home-footer.svg" alt="Home"></div>
      <span class="m-nav-label">Home</span>
    </a>
    <a href="storefront-catalog.html" class="m-nav-item active">
      <div class="m-nav-icon"><img src="../assets/images/svg/search-footer.svg" alt="Products"></div>
      <span class="m-nav-label">Products</span>
    </a>
    <a href="#" class="m-nav-item" data-wa-contact="true">
      <div class="m-nav-icon"><img src="../assets/images/svg/whatsapp.svg" alt="WhatsApp" style="width:24px;"></div>
      <span class="m-nav-label">WhatsApp</span>
    </a>
    <a href="../merchant-dashboard/dashboard-home.html" class="m-nav-item">
      <div class="m-nav-icon"><img src="../assets/images/svg/profile-footer.svg" alt="Dashboard"></div>
      <span class="m-nav-label">Dashboard</span>
    </a>
  </nav>

  <!-- Sort Modal -->
  <div class="modal fade" id="sortModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-body ps-0 pe-0">
          <div class="sort-modal-popup">
            <div class="verify-section-main"><div><p class="privacy_manage">Best match</p><div class="form-check"><input class="form-check-input-radio" type="radio" name="sort" value="best" id="sortBest" checked></div></div></div>
            <div class="verify-section-main"><div><p class="privacy_manage">Price: low to high</p><div class="form-check"><input class="form-check-input-radio" type="radio" name="sort" value="asc" id="sortAsc"></div></div></div>
            <div class="verify-section-main"><div><p class="privacy_manage">Price: high to low</p><div class="form-check"><input class="form-check-input-radio" type="radio" name="sort" value="desc" id="sortDesc"></div></div></div>
            <div class="verify-section-main border-bottom-0"><div><p class="privacy_manage">Best rated</p><div class="form-check"><input class="form-check-input-radio" type="radio" name="sort" value="rating" id="sortRating"></div></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="../assets/javascript/jquery.js"></script>
<script src="../assets/javascript/slick.min.js"></script>
<script src="../assets/javascript/bootstrap.min.js"></script>
<script src="../assets/javascript/script-base.js"></script>
<script src="../assets/javascript/merchant-config.js"></script>
<script src="../assets/javascript/analytics.js"></script>
<script src="../assets/javascript/whatsapp.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  applyMerchantTheme(MERCHANT);

  // Parse URL params
  var params    = new URLSearchParams(window.location.search);
  var filterCat = params.get('cat') || 'all';
  var filterCamp = params.get('campaign') || null;
  var sortMode  = 'best';
  var viewMode  = 'grid';

  // Populate category filter row
  var catRow = document.getElementById('cat-filter-row');
  MERCHANT.categories.forEach(function (cat) {
    var chip = document.createElement('a');
    chip.href = '#';
    chip.className = 'sf-cat-chip' + (filterCat === cat.id ? ' active' : '');
    chip.dataset.cat = cat.id;
    chip.innerHTML =
      '<div class="cat-circle"><img src="../' + cat.icon + '" alt="' + cat.name + '" onerror="this.src=\'../assets/images/svg/fashion.svg\'"></div>' +
      '<span class="cat-name">' + cat.name + '</span>';
    catRow.appendChild(chip);
    chip.addEventListener('click', function(e){ e.preventDefault(); filterCat=cat.id; renderProducts(); setActiveCat(this); });
  });

  function setActiveCat(el) {
    document.querySelectorAll('.sf-cat-chip').forEach(function(c){ c.classList.remove('active'); });
    el.classList.add('active');
  }

  // All chip
  document.querySelector('.sf-cat-chip[data-cat="all"]').addEventListener('click', function(e){
    e.preventDefault(); filterCat='all'; renderProducts(); setActiveCat(this);
  });

  // Campaign countdown
  if (filterCamp) {
    var camp = MERCHANT.campaigns.find(function(c){ return c.id === filterCamp; });
    if (camp) {
      document.getElementById('campaign-banner').style.display = 'block';
      document.getElementById('catalog-header-title').textContent = camp.title;
      startCountdown(new Date(camp.endDate + 'T23:59:59'));
    }
  }

  function startCountdown(end) {
    function tick() {
      var diff = end - Date.now();
      if (diff <= 0) { clearInterval(timer); return; }
      var h = Math.floor(diff / 3600000);
      var m = Math.floor((diff % 3600000) / 60000);
      var s = Math.floor((diff % 60000) / 1000);
      document.getElementById('cd-h').textContent = String(h).padStart(2,'0');
      document.getElementById('cd-m').textContent = String(m).padStart(2,'0');
      document.getElementById('cd-s').textContent = String(s).padStart(2,'0');
    }
    var timer = setInterval(tick, 1000); tick();
  }

  // WA SVG inline helper
  function waSvg() {
    return '<svg viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>';
  }

  function renderProducts() {
    var search = document.getElementById('catalog-search').value.toLowerCase();
    var camp   = filterCamp ? MERCHANT.campaigns.find(function(c){ return c.id===filterCamp; }) : null;

    var filtered = MERCHANT.products.filter(function(p) {
      if (!p.inStock) return false;
      if (camp && !camp.productIds.includes(p.id)) return false;
      if (filterCat !== 'all' && p.category !== filterCat) return false;
      if (search && !p.name.toLowerCase().includes(search) && !p.shortName.toLowerCase().includes(search)) return false;
      return true;
    });

    // Sort
    if (sortMode === 'asc')    filtered.sort(function(a,b){ return a.price - b.price; });
    if (sortMode === 'desc')   filtered.sort(function(a,b){ return b.price - a.price; });
    if (sortMode === 'rating') filtered.sort(function(a,b){ return b.rating - a.rating; });

    document.getElementById('results-count').textContent = filtered.length + ' product' + (filtered.length !== 1 ? 's' : '');
    document.getElementById('catalog-empty').style.display = filtered.length ? 'none' : 'flex';

    // Build cards HTML
    function cardHTML(p) {
      var sale = (p.origPrice && p.origPrice > p.price) ? '<span class="campaign-tag sale">SALE</span>' : '';
      return '<a href="storefront-product.html?id=' + p.id + '" class="sf-product-card">' +
        '<div class="card-img-wrap">' + sale +
          '<img src="../' + p.thumbnail + '" alt="' + p.shortName + '" loading="lazy" onerror="this.src=\'../assets/images/home-screen/womenPro1.png\'">' +
          '<button class="card-wa-btn" onclick="event.preventDefault();WhatsApp.quickContact(\'' + p.id + '\',this)" aria-label="WhatsApp">' + waSvg() + '</button>' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="card-name">' + p.shortName + '</div>' +
          '<div class="card-meta">' +
            '<span class="card-price">' + formatPrice(p.price) + (p.origPrice ? '<span class="orig-price">' + formatPrice(p.origPrice) + '</span>' : '') + '</span>' +
            '<span class="card-rating"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>' + p.rating + '</span>' +
          '</div>' +
        '</div>' +
      '</a>';
    }

    var gridEl = document.getElementById('catalog-grid');
    var listEl = document.getElementById('catalog-list');
    gridEl.innerHTML = filtered.map(cardHTML).join('');
    listEl.innerHTML = filtered.map(cardHTML).join('');
  }

  // Search
  document.getElementById('catalog-search').addEventListener('input', renderProducts);

  // Sort radio change
  document.querySelectorAll('input[name="sort"]').forEach(function(r){
    r.addEventListener('change', function(){
      sortMode = this.value;
      bootstrap.Modal.getInstance(document.getElementById('sortModal'))?.hide();
      renderProducts();
    });
  });

  // View toggle
  document.getElementById('grid-view-btn').addEventListener('click', function(){
    viewMode='grid';
    document.getElementById('catalog-grid').style.display='';
    document.getElementById('catalog-list').style.display='none';
    this.classList.add('active');
    document.getElementById('list-view-btn').classList.remove('active');
  });
  document.getElementById('list-view-btn').addEventListener('click', function(){
    viewMode='list';
    document.getElementById('catalog-grid').style.display='none';
    document.getElementById('catalog-list').style.display='';
    this.classList.add('active');
    document.getElementById('grid-view-btn').classList.remove('active');
  });

  // Initial render
  renderProducts();

  if (typeof Analytics !== 'undefined') Analytics.pageView('storefront_catalog', { merchant: MERCHANT.id });
});
</script>
</body>
</html>
